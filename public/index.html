<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latvian Candles — Post Queue</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; color: #1a1a1a; }
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #18181b; }
.login-box { background: #27272a; border-radius: 16px; padding: 40px; width: 340px; text-align: center; }
.login-box h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
.login-box p { color: #a1a1aa; font-size: 14px; margin-bottom: 28px; }
.login-box input { width: 100%; background: #3f3f46; border: 1px solid #52525b; border-radius: 10px; color: #fff; font-size: 15px; padding: 12px 16px; margin-bottom: 12px; outline: none; display: block; }
.login-box input:focus { border-color: #6366f1; }
.login-box button { width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; padding: 13px; cursor: pointer; }
.login-box button:hover { background: #4f46e5; }
.login-error { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }
#app { display: none; }
header { background: #18181b; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
header h1 { color: #fff; font-size: 18px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right span { color: #a1a1aa; font-size: 13px; }
.btn-add { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-add:hover { background: #4f46e5; }
.toolbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 0; flex-wrap: wrap; gap: 10px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { background: #fff; border: 1.5px solid #e4e4e7; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: #52525b; }
.filter-btn.active { background: #18181b; color: #fff; border-color: #18181b; }
.layout-toggle { display: flex; gap: 4px; background: #fff; border: 1.5px solid #e4e4e7; border-radius: 10px; padding: 3px; }
.layout-btn { background: none; border: none; border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 14px; color: #71717a; line-height: 1; }
.layout-btn.active { background: #18181b; color: #fff; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-pending { background: #fef3c7; color: #92400e; }
.badge-approved { background: #dbeafe; color: #1e40af; }
.badge-posted { background: #d1fae5; color: #065f46; }
.badge-failed { background: #fee2e2; color: #991b1b; }
.badge-slot { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f0f9ff; color: #0369a1; }
.badge-slot.evening { background: #faf5ff; color: #7c3aed; }
.posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 20px 24px 40px; }
.post-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f4f4f5; }
.card-date { font-size: 13px; font-weight: 600; color: #18181b; }
.threads-preview { padding: 16px; }
.threads-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #d97706); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.handle { font-size: 13px; font-weight: 700; color: #18181b; }
.threads-body { font-size: 14px; line-height: 1.55; color: #18181b; word-break: break-word; padding-left: 46px; }
.char-count { padding: 6px 16px 4px 62px; font-size: 11px; color: #a1a1aa; }
.char-count.over { color: #ef4444; }
.reply-thread { padding: 0 16px 14px 16px; display: flex; gap: 10px; }
.reply-line-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 36px; }
.reply-vline { width: 2px; flex: 1; min-height: 12px; background: #e4e4e7; border-radius: 1px; }
.reply-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #d97706); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; }
.reply-content { flex: 1; }
.reply-handle { font-size: 12px; font-weight: 700; color: #71717a; margin-bottom: 2px; }
.reply-text { font-size: 12px; color: #71717a; line-height: 1.4; }
.reply-text a { color: #6366f1; text-decoration: none; }
.reply-edit-area { padding: 8px 16px 12px; border-top: 1px solid #f4f4f5; display: none; }
.reply-edit-area input { width: 100%; border: 1.5px solid #6366f1; border-radius: 8px; font-size: 13px; padding: 8px 10px; font-family: inherit; outline: none; color: #18181b; }
.reply-edit-actions { display: flex; gap: 8px; margin-top: 6px; }
.edit-area { display: none; padding: 12px 16px; border-top: 1px solid #f4f4f5; }
.edit-area textarea { width: 100%; border: 1.5px solid #e4e4e7; border-radius: 10px; font-size: 14px; line-height: 1.55; padding: 10px 12px; resize: vertical; min-height: 120px; font-family: inherit; color: #18181b; outline: none; }
.edit-area textarea:focus { border-color: #6366f1; }
.edit-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-save { background: #18181b; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
.btn-cancel { background: #f4f4f5; color: #52525b; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.card-actions { display: flex; border-top: 1px solid #f4f4f5; }
.action-btn { flex: 1; background: none; border: none; padding: 11px; font-size: 12px; font-weight: 500; color: #71717a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.action-btn:hover { background: #f9f9f9; }
.action-btn + .action-btn { border-left: 1px solid #f4f4f5; }
.action-btn.approve { color: #1e40af; font-weight: 700; }
.action-btn.approve:hover { background: #dbeafe; }
.action-btn.danger { color: #ef4444; }
.action-btn.danger:hover { background: #fef2f2; }
.posts-list { display: flex; flex-direction: column; padding: 16px 24px 40px; }
.list-item { background: #fff; border: 1px solid #e4e4e7; border-bottom: none; display: grid; grid-template-columns: 130px 90px 1fr 110px auto; align-items: center; gap: 12px; padding: 12px 16px; }
.list-item:first-child { border-radius: 12px 12px 0 0; }
.list-item:last-child { border-radius: 0 0 12px 12px; border-bottom: 1px solid #e4e4e7; }
.list-item:only-child { border-radius: 12px; border-bottom: 1px solid #e4e4e7; }
.list-item:hover { background: #fafafa; }
.list-date { font-size: 13px; font-weight: 600; color: #18181b; }
.list-preview { font-size: 13px; color: #3f3f46; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.list-actions { display: flex; gap: 6px; align-items: center; justify-content: flex-end; }
.list-action-btn { background: none; border: 1.5px solid #e4e4e7; border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: #52525b; white-space: nowrap; }
.list-action-btn:hover { background: #f4f4f5; }
.list-action-btn.approve-btn { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; font-weight: 600; }
.list-action-btn.danger { color: #ef4444; border-color: #fecaca; }
.list-action-btn.danger:hover { background: #fef2f2; }
.list-edit-row { grid-column: 1 / -1; display: none; padding-top: 10px; border-top: 1px solid #f4f4f5; margin-top: 4px; }
.list-edit-row textarea { width: 100%; border: 1.5px solid #6366f1; border-radius: 8px; font-size: 13px; padding: 8px 10px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; }
.list-edit-row .edit-actions { margin-top: 6px; }

/* ── Calendar view ─────────────────────────────────────── */
.calendar-wrap { padding: 20px 24px 40px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav h2 { font-size: 20px; font-weight: 700; color: #18181b; }
.cal-nav-btn { background: #fff; border: 1.5px solid #e4e4e7; border-radius: 8px; padding: 6px 14px; font-size: 14px; font-weight: 600; cursor: pointer; color: #18181b; }
.cal-nav-btn:hover { background: #f4f4f5; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e4e4e7; border-radius: 12px; overflow: hidden; }
.cal-day-header { background: #f9f9f9; text-align: center; padding: 8px 4px; font-size: 11px; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
.cal-cell { background: #fff; min-height: 110px; padding: 6px; position: relative; vertical-align: top; }
.cal-cell.other-month { background: #fafafa; }
.cal-cell.today { background: #fafff5; }
.cal-num { font-size: 12px; font-weight: 700; color: #a1a1aa; margin-bottom: 4px; }
.cal-cell.today .cal-num { color: #059669; }
.cal-chip { border-radius: 6px; padding: 3px 6px; margin-bottom: 3px; font-size: 11px; line-height: 1.35; cursor: pointer; word-break: break-word; position: relative; }
.cal-chip:hover { filter: brightness(0.93); }
.cal-chip.pending { background: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
.cal-chip.approved { background: #dbeafe; color: #1e40af; border-left: 3px solid #6366f1; }
.cal-chip.posted { background: #d1fae5; color: #065f46; border-left: 3px solid #10b981; }
.cal-chip.error { background: #fee2e2; color: #991b1b; border-left: 3px solid #ef4444; }
.cal-chip-slot { font-size: 9px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }

/* ── Pop-over for calendar chip clicks ─────────────────── */
.cal-popover { display: none; position: fixed; z-index: 300; background: #fff; border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); width: 340px; max-width: 95vw; overflow: hidden; }
.cal-popover.open { display: block; }
.pop-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid #f4f4f5; }
.pop-date { font-size: 13px; font-weight: 700; color: #18181b; }
.pop-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #71717a; line-height: 1; padding: 0 4px; }
.pop-body { padding: 14px 16px; }
.pop-content { font-size: 14px; line-height: 1.55; color: #18181b; margin-bottom: 10px; }
.pop-reply { font-size: 12px; color: #6366f1; margin-bottom: 14px; }
.pop-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.pop-btn { flex: 1; min-width: 70px; background: #f4f4f5; color: #3f3f46; border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.pop-btn:hover { background: #e4e4e7; }
.pop-btn.approve { background: #dbeafe; color: #1e40af; }
.pop-btn.approve:hover { background: #bfdbfe; }
.pop-btn.danger { background: #fee2e2; color: #991b1b; }
.pop-btn.danger:hover { background: #fecaca; }
.pop-edit-area { margin-top: 10px; display: none; }
.pop-edit-area textarea { width: 100%; border: 1.5px solid #6366f1; border-radius: 8px; font-size: 13px; padding: 8px 10px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; color: #18181b; }
.pop-edit-area .edit-actions { margin-top: 6px; }
.pop-reply-edit { margin-top: 8px; display: none; }
.pop-reply-edit input { width: 100%; border: 1.5px solid #6366f1; border-radius: 8px; font-size: 13px; padding: 8px 10px; font-family: inherit; outline: none; color: #18181b; }
.pop-reply-edit .edit-actions { margin-top: 6px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; width: 480px; max-width: 95vw; padding: 28px; }
.modal h2 { font-size: 18px; margin-bottom: 20px; }
.modal label { font-size: 13px; font-weight: 600; color: #52525b; display: block; margin-bottom: 5px; }
.modal input, .modal textarea, .modal select { width: 100%; border: 1.5px solid #e4e4e7; border-radius: 10px; font-size: 14px; padding: 10px 12px; font-family: inherit; color: #18181b; outline: none; margin-bottom: 16px; }
.modal textarea { min-height: 120px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; }
.btn-primary { flex: 1; background: #18181b; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-secondary { background: #f4f4f5; color: #52525b; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
.empty { text-align: center; padding: 60px 20px; color: #a1a1aa; }
.loading { text-align: center; padding: 60px 20px; color: #a1a1aa; }
.toast { position: fixed; bottom: 24px; right: 24px; background: #18181b; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; }
.toast.show { opacity: 1; }

/* ── Products view ─────────────────────────────────────── */
#products-view { display: none; padding: 20px 24px 40px; }
.prod-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.prod-toolbar h2 { font-size: 20px; font-weight: 700; color: #18181b; }
.prod-toolbar span { font-size: 13px; color: #71717a; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.prod-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
.prod-card.inactive { opacity: 0.55; }
.prod-img { width: 100%; height: 180px; object-fit: cover; background: #f4f4f5; display: block; }
.prod-img-placeholder { width: 100%; height: 180px; background: #f4f4f5; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #d4d4d8; }
.prod-body { padding: 14px 14px 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.prod-title { font-size: 14px; font-weight: 700; color: #18181b; line-height: 1.3; }
.prod-price { font-size: 13px; font-weight: 600; color: #059669; }
.prod-desc { font-size: 12px; color: #52525b; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; flex: 1; }
.prod-meta { font-size: 11px; color: #a1a1aa; margin-top: 2px; }
.prod-meta.posted-date { color: #059669; font-weight: 600; }
.prod-footer { padding: 10px 14px; border-top: 1px solid #f4f4f5; display: flex; align-items: center; justify-content: space-between; }
.prod-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #52525b; cursor: pointer; user-select: none; }
.prod-toggle input[type=checkbox] { width: 16px; height: 16px; accent-color: #18181b; cursor: pointer; }
.prod-order { font-size: 11px; color: #a1a1aa; }

.prod-actions { padding: 0 14px 12px; display: flex; gap: 6px; }
.prod-action-btn { flex: 1; background: #f4f4f5; border: none; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 600; color: #3f3f46; cursor: pointer; }
.prod-action-btn:hover { background: #e4e4e7; }
.prod-action-btn.post-now { background: #18181b; color: #fff; }
.prod-action-btn.post-now:hover { background: #3f3f46; }
.prod-action-btn.posting { background: #6366f1; color: #fff; cursor: wait; }
.prod-edit-area { display: none; padding: 0 14px 12px; }
.prod-edit-area textarea { width: 100%; border: 1.5px solid #6366f1; border-radius: 8px; font-size: 13px; padding: 8px 10px; font-family: inherit; resize: vertical; min-height: 100px; outline: none; color: #18181b; }
.prod-edit-actions { display: flex; gap: 6px; margin-top: 6px; }
.prod-preview { display: none; margin: 0 14px 12px; background: #f9f9f9; border-radius: 10px; padding: 12px; font-size: 13px; line-height: 1.6; color: #18181b; border-left: 3px solid #6366f1; white-space: pre-wrap; }
.prod-preview-reply { font-size: 12px; color: #6366f1; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e4e4e7; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Latvian Candles</h1>
    <p>Post Queue Manager</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>Post Queue</h1>
    <div class="header-right">
      <span id="post-count"></span>
      <button class="btn-add" id="btn-products" style="background:#3f3f46;">Products</button>
      <button class="btn-add" id="btn-new-post">+ New post</button>
    </div>
  </header>
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" id="f-all">All</button>
      <button class="filter-btn" id="f-pending">Pending</button>
      <button class="filter-btn" id="f-approved">Approved</button>
      <button class="filter-btn" id="f-posted">Posted</button>
    </div>
    <div class="layout-toggle">
      <button class="layout-btn" id="btn-grid">Grid</button>
      <button class="layout-btn" id="btn-list">List</button>
      <button class="layout-btn" id="btn-cal">Cal</button>
    </div>
  </div>
  <div id="posts-grid"><div class="loading">Loading posts...</div></div>
</div>

<div id="products-view"><div class="loading">Loading products...</div></div>

<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <h2>New post</h2>
    <label>Date</label>
    <input type="date" id="new-date" />
    <label>Slot</label>
    <select id="new-slot">
      <option value="morning">Morning (10:00 Riga)</option>
      <option value="evening">Evening (20:00 Riga)</option>
    </select>
    <label>Content</label>
    <textarea id="new-content" placeholder="Write your post..."></textarea>
    <label>Image URL (optional)</label>
    <input type="url" id="new-image" placeholder="https://..." />
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-modal">Cancel</button>
      <button class="btn-primary" id="btn-save-modal">Save to queue</button>
    </div>
  </div>
</div>

<!-- Calendar pop-over -->
<div class="cal-popover" id="cal-popover">
  <div class="pop-header">
    <div class="pop-date" id="pop-date"></div>
    <button class="pop-close" id="pop-close">&#x2715;</button>
  </div>
  <div class="pop-body">
    <div class="pop-content" id="pop-content"></div>
    <div class="pop-reply" id="pop-reply"></div>
    <div class="pop-edit-area" id="pop-edit-area">
      <textarea id="pop-ta"></textarea>
      <div class="edit-actions">
        <button class="btn-save" id="pop-save-edit">Save</button>
        <button class="btn-cancel" id="pop-cancel-edit">Cancel</button>
      </div>
    </div>
    <div class="pop-reply-edit" id="pop-reply-edit-area">
      <input type="text" id="pop-reply-ta" placeholder="Custom reply text..." />
      <div class="edit-actions">
        <button class="btn-save" id="pop-save-reply">Save Reply</button>
        <button class="btn-cancel" id="pop-cancel-reply">Cancel</button>
      </div>
    </div>
    <div class="pop-actions" id="pop-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = '/api/posts';
var SECRET = '';
var allPosts = [];
var currentFilter = 'all';
var currentLayout = 'grid';
var calYear = new Date().getFullYear();
var calMonth = new Date().getMonth();
var popPostId = null;
try { currentLayout = localStorage.getItem('lc_layout') || 'grid'; } catch(e) {}
try { var sm = localStorage.getItem('lc_cal_month'); if(sm) { var sp=sm.split('-'); calYear=+sp[0]; calMonth=+sp[1]; } } catch(e) {}

var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').split('\n').join('<br>');
}
function escAttr(s) {
  return (s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtDate(s) {
  var p = s.split('-'), y = +p[0], m = +p[1], d = +p[2];
  var dt = new Date(y, m-1, d);
  return { short: d+' '+MONTHS[m-1], day: DAYS[dt.getDay()], full: DAYS[dt.getDay()]+', '+d+' '+MONTHS[m-1]+' '+y };
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function showLogin(msg) {

}

  document.getElementById('login-screen').style.display = 'none';

}

function login() {
  var email = document.getElementById('login-email').value.trim();
  var pw = document.getElementById('login-password').value;
  if (!email || !pw) return;
  showLogin('');
  fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email:email, password:pw})
  })
  .then(function(r) {
    if (!r.ok) { showLogin('Wrong email or password.'); return null; }
    return r.json();
  })
  .then(function(d) {
    if (!d) return;
    SECRET = d.token;
    try { sessionStorage.setItem('lc_secret', SECRET); } catch(e) {}
    loadPosts();
  })
  .catch(function(e) { showLogin('Error: ' + e.message); });
}

function loadPosts() {
  fetch(API, {headers:{Authorization:'Bearer '+SECRET}})
  .then(function(r) {
    if (!r.ok) { try{sessionStorage.removeItem('lc_secret');}catch(e){} return null; }
    return r.json();
  })
  .then(function(d) {
    if (!d) return;
    allPosts = d;
    showApp();
  })
  .catch(function(e){ console.error(e); });
}

// ── Calendar ──────────────────────────────────────────────────────────────────

function renderCalendar(filteredPosts) {
  var grid = document.getElementById('posts-grid');
  grid.className = '';

  // Build a date→posts map
  var byDate = {};
  for (var i=0; i<filteredPosts.length; i++) {
    var p = filteredPosts[i];
    if (!byDate[p.scheduled_date]) byDate[p.scheduled_date] = [];
    byDate[p.scheduled_date].push(p);
  }

  var firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var todayStr = new Date().toISOString().split('T')[0];

  var html = '<div class="calendar-wrap">';
  html += '<div class="cal-nav">';
  html += '<button class="cal-nav-btn" id="cal-prev">&#8249; Prev</button>';
  html += '<h2>'+MONTHS_LONG[calMonth]+' '+calYear+'</h2>';
  html += '<button class="cal-nav-btn" id="cal-next">Next &#8250;</button>';
  html += '</div>';
  html += '<div class="cal-grid">';

  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (var d=0; d<7; d++) {
    html += '<div class="cal-day-header">'+dayNames[d]+'</div>';
  }

  // Blanks before month starts
  for (var b=0; b<firstDay; b++) {
    html += '<div class="cal-cell other-month"></div>';
  }

  for (var day=1; day<=daysInMonth; day++) {
    var mm = String(calMonth+1).padStart(2,'0');
    var dd = String(day).padStart(2,'0');
    var dateStr = calYear+'-'+mm+'-'+dd;
    var isToday = dateStr===todayStr;
    html += '<div class="cal-cell'+(isToday?' today':'')+'">';
    html += '<div class="cal-num">'+day+'</div>';
    var dayPosts = byDate[dateStr] || [];
    for (var j=0; j<dayPosts.length; j++) {
      var pp = dayPosts[j];
      var slotLabel = (pp.slot==='evening') ? 'Eve' : 'Morn';
      var snippet = (pp.content||'').slice(0,50)+(pp.content&&pp.content.length>50?'...':'');
      html += '<div class="cal-chip '+pp.status+'" onclick="openPopover('+pp.id+',event)">';
      html += '<div class="cal-chip-slot">'+slotLabel+'</div>';
      html += esc(snippet);
      html += '</div>';
    }
    html += '</div>';
  }

  // Trailing blanks to complete the last week row
  var totalCells = firstDay + daysInMonth;
  var remainder = totalCells % 7;
  if (remainder > 0) {
    for (var t=0; t<(7-remainder); t++) {
      html += '<div class="cal-cell other-month"></div>';
    }
  }

  html += '</div></div>';
  grid.innerHTML = html;

  document.getElementById('cal-prev').addEventListener('click', function(){
    calMonth--;
    if (calMonth < 0) { calMonth=11; calYear--; }
    try { localStorage.setItem('lc_cal_month', calYear+'-'+calMonth); } catch(e){}
    render();
  });
  document.getElementById('cal-next').addEventListener('click', function(){
    calMonth++;
    if (calMonth > 11) { calMonth=0; calYear++; }
    try { localStorage.setItem('lc_cal_month', calYear+'-'+calMonth); } catch(e){}
    render();
  });
}

function openPopover(id, evt) {
  evt.stopPropagation();
  popPostId = id;
  var p = allPosts.find(function(x){ return x.id===id; });
  if (!p) return;
  var pop = document.getElementById('cal-popover');
  var d = fmtDate(p.scheduled_date);
  var slot = (p.slot==='evening') ? 'Evening' : 'Morning';
  document.getElementById('pop-date').textContent = d.full+' · '+slot+' · '+p.status.toUpperCase();
  document.getElementById('pop-content').innerHTML = esc(p.content);
  document.getElementById('pop-reply').textContent = 'Reply: '+(p.reply_text || 'Our full collection is at latviancandles.store');
  document.getElementById('pop-edit-area').style.display='none';
  document.getElementById('pop-reply-edit-area').style.display='none';

  var ip = p.status==='pending', ia = p.status==='approved';
  var actHtml = '';
  if (ip) actHtml += '<button class="pop-btn approve" onclick="approvePost('+id+');closePopover()">Approve</button>';
  if (ip) actHtml += '<button class="pop-btn" onclick="showPopEdit()">Edit</button>';
  if (ip||ia) actHtml += '<button class="pop-btn" onclick="showPopReply()">Reply</button>';
  if (ia) actHtml += '<button class="pop-btn danger" onclick="unapprovePost('+id+');closePopover()">Undo</button>';
  if (ip) actHtml += '<button class="pop-btn danger" onclick="deletePost('+id+');closePopover()">Delete</button>';
  if (p.status==='posted') actHtml += '<button class="pop-btn" onclick="copyText('+id+');closePopover()">Copy</button>';
  document.getElementById('pop-actions').innerHTML = actHtml;

  // Position near click
  var x = evt.clientX, y = evt.clientY;
  var pw = 340, ph = 300;
  var left = Math.min(x+10, window.innerWidth-pw-16);
  var top = Math.min(y+10, window.innerHeight-ph-16);
  pop.style.left = left+'px';
  pop.style.top = top+'px';
  pop.classList.add('open');
}

function showPopEdit() {
  var p = allPosts.find(function(x){ return x.id===popPostId; });
  if (!p) return;
  document.getElementById('pop-ta').value = p.content || '';
  document.getElementById('pop-edit-area').style.display='block';
  document.getElementById('pop-ta').focus();
}

function showPopReply() {
  var p = allPosts.find(function(x){ return x.id===popPostId; });
  document.getElementById('pop-reply-ta').value = (p && p.reply_text) ? p.reply_text : 'Our full collection is at latviancandles.store';
  document.getElementById('pop-reply-edit-area').style.display='block';
  document.getElementById('pop-reply-ta').focus();
}

function closePopover() {
  document.getElementById('cal-popover').classList.remove('open');
  popPostId = null;
}

document.addEventListener('click', function(e){
  var pop = document.getElementById('cal-popover');
  if (pop.classList.contains('open') && !pop.contains(e.target)) closePopover();
});

    var lastPosted = p.last_posted_at ? 'Last posted: ' + fmtDate(p.last_posted_at) : 'Never posted'
    var lastClass = p.last_posted_at ? 'posted-date' : ''
    var imgHtml = p.image_url
      ? '<img class="prod-img" src="' + escHtml(p.image_url) + '" loading="lazy" onerror="prodImgErr(this)">'
      : '<div class="prod-img-placeholder">\u{1F56F}\uFE0F</div>'
    var PROD_REPLY_VARIANTS = ['Get yours at','Shop this mold at','Find it at','Order yours at','See more at']
    var dayIdx = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000) % PROD_REPLY_VARIANTS.length
    var replyText = PROD_REPLY_VARIANTS[dayIdx] + ' latviancandles.store/products/' + p.handle
    html += '<div class="prod-card' + (p.active ? '' : ' inactive') + '" data-id="' + p.id + '">'
    html +=   imgHtml
    html +=   '<div class="prod-body">'
    html +=     '<div class="prod-title">' + escHtml(p.title) + '</div>'
    if (p.price) html += '<div class="prod-price">€' + parseFloat(p.price).toFixed(2) + '</div>'
    html +=     '<div class="prod-desc">' + escHtml(p.description) + '</div>'
    html +=     '<div class="prod-meta ' + lastClass + '">' + lastPosted + '</div>'
    html +=   '</div>'
    html +=   '<div class="prod-preview" id="prev-' + p.id + '">' + escHtml(p.description) + '<div class="prod-preview-reply">&#x21A9; ' + escHtml(replyText) + '</div></div>'
    html +=   '<div class="prod-edit-area" id="edit-' + p.id + '"><textarea id="editta-' + p.id + '">' + escHtml(p.description) + '</textarea><div class="prod-edit-actions"><button class="btn-save" onclick="saveProductDesc(\''+p.id+'\')">Save</button><button class="btn-cancel" onclick="cancelProductEdit(\''+p.id+'\')">Cancel</button></div></div>'
    html +=   '<div class="prod-actions"><button class="prod-action-btn" onclick="toggleProdPreview(\''+p.id+'\')">Preview</button><button class="prod-action-btn" onclick="openProductEdit(\''+p.id+'\')">Edit text</button><button class="prod-action-btn post-now" id="postnow-'+p.id+'" onclick="postProductNow(\''+p.id+'\')">Post now</button></div>'
    html +=   '<div class="prod-footer"><label class="prod-toggle"><input type="checkbox" ' + (p.active ? 'checked' : '') + ' onchange="toggleProduct(\''+p.id+'\',this.checked)"> In rotation</label><span class="prod-order">#' + p.sort_order + '</span></div>'
    html += '</div>'
  })
  html += '</div>'
  view.innerHTML = html
}

function toggleProdPreview(id) {
  var el = document.getElementById('prev-' + id)
  el.style.display = el.style.display === 'block' ? 'none' : 'block'
}

function openProductEdit(id) {
  document.getElementById('edit-' + id).style.display = 'block'
  document.getElementById('prev-' + id).style.display = 'none'
}

function cancelProductEdit(id) {
  document.getElementById('edit-' + id).style.display = 'none'
}

function saveProductDesc(id) {
  var desc = document.getElementById('editta-' + id).value.trim()
  if (!desc) return
  fetch(PROD_API, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + SECRET, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id, description: desc })
  })
  .then(function(r) { return r.json() })
  .then(function(updated) {
    var idx = allProducts.findIndex(function(p) { return p.id === id })
    if (idx !== -1) allProducts[idx] = updated
    renderProducts()
    showToast('Description saved')
  })
  .catch(function() { showToast('Save failed') })
}

function postProductNow(id) {
  var btn = document.getElementById('postnow-' + id)
  if (!btn || btn.classList.contains('posting')) return
  btn.classList.add('posting')
  btn.textContent = 'Posting…'
  fetch(PROD_API, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + SECRET, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id })
  })
  .then(function(r) { return r.json() })
  .then(function(d) {
    if (d.ok) {
      showToast('Posted to Threads!')
      loadProducts()
    } else {
      showToast('Failed: ' + (d.error || 'unknown'))
      btn.classList.remove('posting')
      btn.textContent = 'Post now'
    }
  })
  .catch(function() {
    showToast('Post failed')
    btn.classList.remove('posting')
    btn.textContent = 'Post now'
  })
}

function toggleProduct(id, active) {
  fetch(PROD_API, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + SECRET, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id, active: active })
  })
  .then(function(r) { return r.json() })
  .then(function(updated) {
    var idx = allProducts.findIndex(function(p) { return p.id === id })
    if (idx !== -1) allProducts[idx] = updated
    renderProducts()
    showToast(active ? 'Added to rotation' : 'Removed from rotation')
  })
  .catch(function() { showToast('Failed to update') })
}

function fmtDate(iso) {
  var d = new Date(iso)
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
}

function escHtml(s) {
  if (!s) return ''
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

</script>
</body>
</html>
